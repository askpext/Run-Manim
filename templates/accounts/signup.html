{% extends 'base.html' %}

{% block title %}Signup{% endblock %}

{% block extra_head %}
<style>
    /* VS Code Dark+ palette */
    :root {
        --bg: #1e1e1e;
        --panel: #252526;
        --muted-panel: #2d2d2d;
        --text: #d4d4d4;
        --subtext: #cccccc;
        --input-bg: #1f1f1f;
        --input-border: #3c3c3c;
        --accent: #0e639c;
        --accent-hover: #1177bb;
        --focus: #094771;
        --shadow: rgba(0, 0, 0, 0.6);
    }

    html,
    body {
        height: 100%;
        margin: 0;
        background: var(--bg);
        font-family: "Fira Code", "Source Code Pro", ui-monospace, monospace;
        color: var(--text);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        min-width: 320px;
        max-width: 420px;
        width: 90%;
        background: linear-gradient(180deg, var(--panel), var(--muted-panel));
        border: 1px solid #00000055;
        box-shadow: 0 8px 30px var(--shadow);
        padding: 20px 22px;
        border-radius: 6px;
    }

    h2 {
        margin: 0 0 14px 0;
        font-size: 18px;
        color: var(--text);
        font-weight: 600;
        letter-spacing: 0.2px;
    }

    form {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    form p {
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    label {
        color: var(--subtext);
        font-size: 13px;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"] {
        background: var(--input-bg);
        color: var(--text);
        border: 1px solid var(--input-border);
        padding: 10px 12px;
        border-radius: 4px;
        font-family: inherit;
        font-size: 14px;
        transition: box-shadow .12s ease, border-color .12s ease;
        outline: none;
    }

    input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(14, 99, 156, 0.12);
    }

    button[type="submit"] {
        background: var(--accent);
        color: #fff;
        border: 1px solid var(--accent);
        padding: 8px 12px;
        font-size: 14px;
        font-weight: 600;
        border-radius: 3px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    button[type="submit"]:hover {
        background: var(--accent-hover);
        border-color: var(--accent-hover);
    }

    button[type="submit"]:active {
        background: var(--focus);
        border-color: var(--focus);
    }

    .helptext,
    .errorlist {
        color: #f44747;
        font-size: 13px;
        margin-top: 6px;
    }

    @media (max-width:420px) {
        .container {
            margin: 0 12px;
            padding: 16px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="container" role="main" aria-labelledby="signup-heading">
    <h2 id="signup-heading">Signup</h2>
    <form method="post" novalidate>
        {% csrf_token %}
        {{ form.as_p }}
        <div style="display:flex; justify-content:flex-end; margin-top:6px;">
            <button type="submit">Signup</button>
        </div>
    </form>
</div>
{% endblock %}
